graph:
  apiVersion: stagefabric.dev/v1alpha1
  kind: StageGraph
  metadata:
    name: privacy-first-rag
  inputs:
    - name: text
      type: text/plain
      classification: secret
      residencies: [EU]
      origin:
        zone: browser
        targetId: browser-runtime
  stages:
    - id: classify
      operation: classify
      inputs:
        text: { ref: input.text, type: text/plain }
      outputs:
        - { name: label, type: label/contact, classification: secret }
      requirements:
        capabilities: [classify]
    - id: redact
      operation: redact
      inputs:
        text: { ref: input.text, type: text/plain }
        label: { ref: classify.label, type: label/contact }
      outputs:
        - { name: safe, type: text/plain, classification: internal }
      requirements:
        capabilities: [privacy.redact]
      declassifications:
        - output: safe
          toClassification: internal
          authorityCapability: privacy.declassify
          justification: deterministic removal of configured direct identifiers
    - id: embed
      operation: embed
      inputs:
        text: { ref: redact.safe, type: text/plain }
      outputs:
        - { name: vector, type: vector/f32, classification: internal }
      requirements:
        capabilities: [embed]
    - id: retrieve
      operation: retrieve
      inputs:
        vector: { ref: embed.vector, type: vector/f32 }
      outputs:
        - { name: context, type: text/plain, classification: public }
      requirements:
        capabilities: [retrieve]
      declassifications:
        - output: context
          toClassification: public
          authorityCapability: privacy.declassify
          justification: retrieval returns only a public synthetic document identifier
    - id: reason
      operation: reason
      inputs:
        context: { ref: retrieve.context, type: text/plain }
      outputs:
        - { name: answer, type: text/plain, classification: public }
      requirements:
        capabilities: [reason]
